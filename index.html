<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop 1 - EdgeOne Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center h-screen font-sans">

    <div class="w-full max-w-2xl h-[80vh] bg-gray-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-700">
        <!-- Header -->
        <div class="p-4 border-b border-gray-700 flex items-center gap-3 bg-gray-800/50 backdrop-blur">
            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">
                <i class="fa-solid fa-robot text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg">EdgeOne AI Assistant</h1>
                <p class="text-xs text-gray-400">Workshop 1 • Online</p>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Pesan Sambutan -->
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
                    <p class="text-sm">Halo! Saya AI dari EdgeOne Makers. Ada yang bisa saya bantu hari ini? </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t border-gray-700 bg-gray-800/50">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Ketik pesan..." 
                    class="flex-1 bg-gray-700 text-white rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-10 h-10 flex items-center justify-center transition-colors"
                >
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        
        // Array untuk menyimpan history percakapan (Context Memory)
        let conversationHistory = [
            { role: 'system', content: 'Kamu adalah asisten AI yang ramah dan membantu. Jawab dalam bahasa Indonesia yang santai.' }
        ];

        // Fungsi untuk nambahin bubble chat ke UI
        function addMessage(role, content) {
            const isUser = role === 'user';
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-3 ${isUser ? 'justify-end' : ''}`;
            
            if (isUser) {
                messageDiv.innerHTML = `
                    <div class="bg-blue-600 rounded-2xl rounded-tr-none p-3 max-w-[80%]">
                        <p class="text-sm">${content}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-600 flex-shrink-0 flex items-center justify-center">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
                        <p class="text-sm">${content}</p>
                    </div>
                `;
            }
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fungsi buat nampilin animasi loading (titik-titik)
        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'flex gap-3';
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 flex gap-1 items-center">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const loadingDiv = document.getElementById('loading-indicator');
            if (loadingDiv) loadingDiv.remove();
        }

        // Logic kirim pesan ke backend
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            // Masukin ke array history biar AI ingat konteks
            conversationHistory.push({ role: 'user', content: message });
            userInput.value = '';

            addLoading();

            try {
                // Kirim ke Edge Function kita di /api/chat
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                removeLoading();

                if (data.reply) {
                    addMessage('assistant', data.reply);
                    conversationHistory.push({ role: 'assistant', content: data.reply });
                } else {
                    addMessage('assistant', 'Maaf, terjadi kesalahan: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                removeLoading();
                addMessage('assistant', 'Error koneksi ke server.');
                console.error(error);
            }
        });
    </script>
</body>
</html>
